<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Master - Test Your Knowledge</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🎯 Quiz Master</h1>
            <p>Test Your Knowledge with Multiple Choice Questions</p>
        </header>

        <!-- Quiz Selection Screen -->
        <div id="quizSelection" class="screen">
            <h2>Select a Quiz</h2>
            <div class="quiz-grid">
                <button class="quiz-btn" onclick="startQuiz(0)">General Knowledge</button>
                <button class="quiz-btn" onclick="startQuiz(1)">Science</button>
                <button class="quiz-btn" onclick="startQuiz(2)">History</button>
                <button class="quiz-btn" onclick="startQuiz(3)">Geography</button>
            </div>
        </div>

        <!-- Quiz Screen -->
        <div id="quizScreen" class="screen hidden">
            <div class="quiz-header">
                <div class="progress-bar">
                    <div id="progressFill" class="progress-fill"></div>
                </div>
                <div class="quiz-info">
                    <span id="questionNumber">Question 1 of 5</span>
                    <span id="score">Score: 0</span>
                </div>
            </div>

            <div class="question-container">
                <h3 id="question"></h3>
                <div id="optionsContainer" class="options-container"></div>
            </div>

            <div class="button-group">
                <button id="nextBtn" class="btn btn-primary" onclick="nextQuestion()" disabled>Next Question</button>
                <button class="btn btn-secondary" onclick="goBack()">Back to Menu</button>
            </div>
        </div>

        <!-- Results Screen -->
        <div id="resultsScreen" class="screen hidden">
            <div class="results-container">
                <h2>Quiz Complete!</h2>
                <div class="score-display">
                    <div class="score-circle">
                        <span id="finalScore">0</span>
                        <span class="score-max">/5</span>
                    </div>
                    <p id="scoreMessage"></p>
                </div>
                <div id="resultsDetails" class="results-details"></div>
                <div class="button-group">
                    <button class="btn btn-primary" onclick="restartQuiz()">Try Another Quiz</button>
                    <button class="btn btn-secondary" onclick="goBack()">Back to Menu</button>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
